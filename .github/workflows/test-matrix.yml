name: Marshal Module Test Matrix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: 测试矩阵 — 覆盖 操作系统 × Python 版本
  # ============================================================
  test-matrix:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 显示环境信息
        run: |
          python --version
          python -c "import sys,platform; print(sys.version); print(platform.system(), platform.release())"

      - name: 运行 pytest 测试套件
        run: python -m pytest tests/ -v --tb=short

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: .pytest_cache/  # 仅示例，实际可替换为正式报告

  # ============================================================
  # Job 2: 验证 marshal 字节流在不同平台间的哈希一致性
  # ============================================================
  hash-consistency:
    name: 哈希一致性校验
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 生成 marshal 序列化基准哈希
        run: python tests/scripts/generate_hashes.py

      - name: 上传哈希基准
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hashes-py${{ matrix.python-version }}
          path: marshal_hashes_py${{ matrix.python-version }}.csv

  # ============================================================
  # Job 3: 边界值与特殊值测试（跨平台交叉验证）
  # ============================================================
  boundary-test:
    name: 边界测试 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 运行边界值测试
        run: python tests/scripts/boundary_test.py

  # ============================================================
  # Job 4: 递归/循环数据结构测试
  # ============================================================
  recursive-test:
    name: 递归结构测试 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 运行递归数据结构测试
        run: python tests/scripts/recursive_test.py
