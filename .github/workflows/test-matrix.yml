# ====================================================================
# 【workflow 名称】— 显示在 GitHub Actions 页面上
# ====================================================================
name: 测试矩阵

# ====================================================================
# 【触发条件】— 什么时候自动运行这个 workflow
# ====================================================================
on:
  push:                     # git push 推送代码时触发
    branches: [ main, master ]
  pull_request:             # 创建 Pull Request 时触发
    branches: [ main, master ]
  workflow_dispatch:        # 允许在 GitHub 网页上手动点按钮运行

# ====================================================================
# 【环境变量】— 所有 job 都能读到的全局变量
# ====================================================================
env:
  PYTHONIOENCODING: utf-8   # 解决 Windows runner 打印中文时报错
  PYTHONHASHSEED: 0         # 固定哈希种子，确保 set/dict 顺序跨进程一致

# ====================================================================
# 【job 1】测试矩阵 — 3 系统 × 5 Python 版本 = 15 个并行任务
# ====================================================================
jobs:
  test-matrix:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false       # 一个组合失败，不影响其他继续跑
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
                              # 3×5 = 15 个组合同时跑

    steps:
      - uses: actions/checkout@v4
              # Step 1：把 GitHub 上的代码下载到 runner

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
                  # Step 2：安装指定版本的 Python

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest
                  # Step 3：安装测试框架

      - name: 显示环境信息
        run: |
          python --version
          python -c "import sys,platform,os; print(sys.version); print(platform.system(), platform.release()); print('PYTHONHASHSEED=', os.environ.get('PYTHONHASHSEED','NOT SET'))"
                  # Step 4：打印环境，方便排查

      - name: 运行 pytest 测试套件
        run: python -m pytest tests/ -v -s --tb=short --junitxml=test-results/results-${{ matrix.os }}-py${{ matrix.python-version }}.xml
                  # Step 5：跑 tests/ 下所有 test_*.py 文件

      - name: 生成 JSON 结构化报告 (marshal 主报告)
        shell: bash
        env:
          PYTHONHASHSEED: 0
        run: |
          mkdir -p test-results
          python tests/test_marshal.py 2>&1 | tee test-results/marshal_report_py$(echo "${{ matrix.python-version }}" | tr -d '.').txt
          mv marshal_report_py*.json test-results/
                  # Step 6：调用 test_marshal.py 输出 JSON + print 日志到 test-results/

      - name: 生成 JSON 结构化报告 (矩阵环境验证)
        shell: bash
        env:
          PYTHONHASHSEED: 0
        run: |
          python tests/test_marshal_matrix.py 2>&1 | tee test-results/marshal_matrix_report_py$(echo "${{ matrix.python-version }}" | tr -d '.').txt
          mv marshal_matrix_report_py*.json test-results/
                  # Step 7：调用 test_marshal_matrix.py 输出环境验证 JSON 到 test-results/

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-results/
                  # Step 8：把测试报告保存到 GitHub 网页端

  # ====================================================================
  # 【job 2】汇总报告 — 等所有 matrix 跑完后，合并成一份
  # ====================================================================
  aggregate-reports:
    name: 汇总报告
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有 matrix 报告
        uses: actions/download-artifact@v4
        with:
          path: all-reports/
          pattern: report-*

      - name: 列出下载的报告文件
        run: find all-reports/ -type f | head -50

      - name: 合并 JSON 报告
        run: python .github/merge_reports.py

      - name: 列出汇总结果
        run: ls -la combined-report/

      - name: 上传汇总报告
        uses: actions/upload-artifact@v4
        with:
          name: 00-combined-report
          path: combined-report/
