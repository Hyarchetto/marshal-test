name: Marshal Module Test Matrix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ============================================================
  # Job 1: 测试矩阵 - 覆盖 操作系统 × Python 版本
  # ============================================================
  test-matrix:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台继续运行
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 显示环境信息
        run: |
          python --version
          python -c "import sys; print(f'Python {sys.version}')"
          python -c "import platform; print(f'OS: {platform.system()} {platform.release()}')"
          python -c "import struct; print(f'Arch: {struct.calcsize(\"P\") * 8}-bit')"

      - name: 安装依赖（如果有）
        run: |
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          else { echo "无 requirements.txt，跳过依赖安装" }
        shell: pwsh

      - name: 运行 marshal 测试套件
        run: python -m pytest tests/ -v --tb=short --junitxml=report-${{ matrix.os }}-py${{ matrix.python-version }}.xml

      - name: 上传测试报告
        if: always()  # 即使测试失败也上传
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: report-${{ matrix.os }}-py${{ matrix.python-version }}.xml

  # ============================================================
  # Job 2: 验证 marshal 字节流在不同平台间的哈希一致性
  # ============================================================
  hash-consistency:
    name: 哈希一致性校验
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 生成 marshal 序列化基准哈希
        run: |
          python -c "
import marshal, hashlib, io

test_cases = {
    'none': None,
    'true': True,
    'false': False,
    'int_zero': 0,
    'int_pos': 42,
    'int_neg': -42,
    'int_large': 2**63 - 1,
    'float_zero': 0.0,
    'float_pi': 3.141592653589793,
    'float_nan': float('nan'),
    'float_inf': float('inf'),
    'str_empty': '',
    'str_hello': 'Hello, marshal!',
    'list_empty': [],
    'list_nested': [1, [2, [3]]],
    'tuple_mixed': (1, 'a', 3.14, None),
    'dict_simple': {'key': 'value', 'num': 42},
    'bytes_data': b'\\x00\\x01\\x02\\xff',
    'complex_num': 1+2j,
}

for name, obj in test_cases.items():
    buf = io.BytesIO()
    marshal.dump(obj, buf)
    h = hashlib.sha256(buf.getvalue()).hexdigest()
    print(f'{name},{h}')
" > marshal_hashes_py${{ matrix.python-version }}.csv

      - name: 上传哈希基准
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hashes-py${{ matrix.python-version }}
          path: marshal_hashes_py${{ matrix.python-version }}.csv

  # ============================================================
  # Job 3: 边界值与特殊值测试（跨平台交叉验证）
  # ============================================================
  boundary-test:
    name: 边界测试 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 运行边界值测试
        run: |
          python -c "
import marshal, io, sys

# ---- 整数边界 ----
int_cases = [
    ('int_min_i32', -2**31),
    ('int_max_i32', 2**31 - 1),
    ('int_min_i64', -2**63),
    ('int_max_i64', 2**63 - 1),
    ('int_min_i16', -2**15),
    ('int_max_i16', 2**15 - 1),
    ('int_large_pos', 2**100),
    ('int_large_neg', -2**100),
]

# ---- 浮点数边界 ----
float_cases = [
    ('float_min', sys.float_info.min),
    ('float_max', sys.float_info.max),
    ('float_epsilon', sys.float_info.epsilon),
    ('float_neg_zero', -0.0),
    ('float_nan', float('nan')),
    ('float_neg_nan', -float('nan')),
    ('float_inf', float('inf')),
    ('float_neg_inf', -float('inf')),
    ('float_denorm', 1e-308),
]

# ---- 字符串边界 ----
str_cases = [
    ('str_empty', ''),
    ('str_single', 'a'),
    ('str_unicode', '你好，世界 🌍'),
    ('str_control', chr(0) + chr(31) + chr(127)),
    ('str_very_long', 'A' * 100_000),
]

# ---- 容器边界 ----
container_cases = [
    ('list_empty', []),
    ('list_large', list(range(10_000))),
    ('tuple_empty', ()),
    ('dict_empty', {}),
    ('dict_large', {i: i for i in range(10_000)}),
    ('set_empty', set()),
    ('frozenset_empty', frozenset()),
]

all_cases = int_cases + float_cases + str_cases + container_cases

failed = 0
for name, obj in all_cases:
    try:
        buf = io.BytesIO()
        marshal.dump(obj, buf)
        buf.seek(0)
        loaded = marshal.load(buf)
        print(f'  [PASS] {name} (size={len(buf.getvalue())} bytes)')
    except Exception as e:
        print(f'  [FAIL] {name} -> {e}')
        failed += 1

print(f'\\n结果: {len(all_cases) - failed}/{len(all_cases)} 通过')
if failed:
    sys.exit(1)
"

  # ============================================================
  # Job 4: 递归/循环数据结构测试
  # ============================================================
  recursive-test:
    name: 递归结构测试 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 运行递归数据结构测试
        run: |
          python -c "
import marshal, io, sys

# ---- 递归/循环结构 ----
recursive_cases = []

# 列表包含自身
lst = []
lst.append(lst)
recursive_cases.append(('list_self_ref', lst))

# 字典包含自身
d = {}
d['self'] = d
recursive_cases.append(('dict_self_ref', d))

# 列表包含相同对象的多个引用
shared = [1, 2, 3]
multi_ref = [shared, shared, [shared]]
recursive_cases.append(('list_multi_shared_ref', multi_ref))

# 深层嵌套
deep = []
cursor = deep
for _ in range(5000):
    cursor.append([])
    cursor = cursor[0]
recursive_cases.append(('list_deep_nest_5000', deep))

failed = 0
for name, obj in recursive_cases:
    try:
        buf = io.BytesIO()
        marshal.dump(obj, buf)
        buf.seek(0)
        loaded = marshal.load(buf)
        print(f'  [PASS] {name} (size={len(buf.getvalue())} bytes)')
    except (ValueError, RecursionError) as e:
        print(f'  [SKIP] {name} 预期拒绝 -> {e}')
    except Exception as e:
        print(f'  [FAIL] {name} -> {e}')
        failed += 1

print(f'\\n结果: {len(recursive_cases) - failed}/{len(recursive_cases)} 通过')
if failed:
    sys.exit(1)
"
